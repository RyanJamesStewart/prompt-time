name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: PSScriptAnalyzer + Pester
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer + Pester
        shell: powershell
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck
          Install-Module -Name Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        shell: powershell
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity @('Error','Warning') `
            -ExcludeRule @('PSAvoidUsingWriteHost','PSUseDeclaredVarsMoreThanAssignments')
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)."
            exit 1
          }
          Write-Host "PSScriptAnalyzer clean."

      - name: Run Pester suite
        shell: powershell
        run: |
          ./tests/run.ps1

      - name: Upload Pester results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: tests/pester-results.xml
          if-no-files-found: ignore
